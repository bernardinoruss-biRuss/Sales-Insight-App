name: Sync to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git for HF
        run: |
          git config --global credential.helper store
          echo "https://byRuss:${{ secrets.HF_TOKEN }}@huggingface.co" > ~/.git-credentials

      - name: Add HF remote and push
        run: |
          git remote add hf https://huggingface.co/spaces/byRuss/SalesIntelligence || true
          git fetch hf || true
          git push hf main --force
