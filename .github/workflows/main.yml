name: Sync to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        run: |
          git push https://byRuss:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/byRuss/SalesIntelligence main --force
