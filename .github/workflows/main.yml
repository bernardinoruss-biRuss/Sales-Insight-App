name: Sync to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git to prevent 'detached HEAD' or branch mismatch errors
          git config --global user.email "bot@huggingface.co"
          git config --global user.name "Hugging Face Sync Bot"
          
          # Use a more robust push command
          git push --force https://byRuss:$HF_TOKEN@huggingface.co/spaces/byRuss/SalesIntelligence main
